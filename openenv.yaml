name: dataops_rl_env
version: "1.2.0"

description: >
  A real-world DataOps environment for training and evaluating autonomous agents
  on tabular data cleaning and pipeline debugging tasks.

entrypoint: env.environment:DataOpsEnv

observation_schema: env.models:Observation
action_schema: env.models:Action
reward_schema: env.models:Reward

actions:
  - inspect_column
  - fill_missing
  - convert_type
  - remove_duplicates
  - run_pipeline
  - use_tool

tools:
  - profile_data
  - view_logs
  - query_sql

reward:
  type: dense
  components:
    - score_delta
    - quality_delta
    - hidden_progress
    - pipeline_bonus
    - tool_bonus
    - repeat_penalty
    - no_op_penalty
    - action_cost
  shaping:
    positive:
      - partial quality improvement
      - hidden issue resolution
      - successful pipeline execution
    negative:
      - repeated unproductive actions
      - premature pipeline execution
      - action overhead and no-op behavior

termination:
  success:
    min_grader_score:
      missing_values_easy: 0.95
      schema_fix_medium: 0.93
      pipeline_debug_hard: 0.90

    all_hidden_resolved: true
    pipeline_success: true

  failure:
    max_steps:
      missing_values_easy: 12
      schema_fix_medium: 15
      pipeline_debug_hard: 15

tasks:
  - id: missing_values_easy
    difficulty: easy
    description: Resolve missing values and run a clean pipeline pass.
    objective: Impute missing values and reach high completeness quickly.
    max_steps: 12

  - id: schema_fix_medium
    difficulty: medium
    description: Repair invalid numeric fields and restore schema compliance.
    objective: Convert malformed numeric columns and clear missing values.
    max_steps: 15
    
  - id: pipeline_debug_hard
    difficulty: hard
    description: Debug a broken pipeline with duplicates, nulls, and type failures.
    objective: Apply multi-step cleanup and finish with a successful pipeline run.
    max_steps: 15

endpoints:
  reset: /reset
  step: /step
  state: /state
  grader: /grader
  tasks: /tasks
  baseline: /baseline

constraints:
  max_steps: 15
  max_file_size_mb: 200
  supported_formats:
    - csv

metrics:
  primary: grader_score
  secondary:
    - data_quality
    - hidden_resolution
    - efficiency
    - pipeline_success

metadata:
  author: "Core Tech Team"
  license: "MIT"
  tags:
    - openenv
    - reinforcement-learning
    - dataops
    - autonomous-agents
    - data-cleaning
    - pipeline-debugging
